<!DOCTYPE html>
<html>
<head>
	<title></title>
</head>
<body>
	<script>
		var a=parseInt(prompt("Enter Number"));
		var b=parseInt(prompt("Enter Number2"));

		var c=prompt("Enetr +,-,*,/");

		switch(c)
		{
			case "+":
				alert(a+b);
				break;


			case "-":
				alert(a-b);
				break;

			case "*":
				alert(a*b);
				break;

			case "/":
				alert(a/b);
				break;

			default:
			alert("Invalid Sign");
		}
	</script>
</body>
</html>
