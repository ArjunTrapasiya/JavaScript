<!-- Write a JavaScript program to find the factorial of a given number using a popup box. -->
<!DOCTYPE html>
<html>
<head>
	<title>Factorial</title>
</head>
<body>
</body>
<script>
	var a=parseInt(prompt("Enter Number: "));
	var ans=1;
	var i;

	for(i=1;i<=a;i++)
	{
		ans=ans*i;
	}

	alert (`Factorial Is ${ans}`);
</script>
</html>
