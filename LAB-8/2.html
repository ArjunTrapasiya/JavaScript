<!--Write a JavaScript program to check whether a given number is prime or not using a popup box.-->
<!DOCTYPE html>
<html>
<head>
	<title>Prime Number</title>
</head>
<body>
</body>
<script>
	var n=parseInt(prompt("Enter A Number: "));
	var i;
	var flag=0;

	for(i=1;i<=n;i++)
	{
		if(n%i==0)
		{
		  flag++;
		}
		
	}
	if(flag==2)
	{
		alert("Number Is Prime.")
	}
	else
	{
		alert("Number is Not Prime.")
	}


</script>
</html>
